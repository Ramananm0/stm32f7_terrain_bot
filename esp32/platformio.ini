; PlatformIO project configuration for ESP32 encoder slave
; Build with: pio run
; Upload with: pio run --target upload
; Monitor with: pio device monitor

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200

build_flags =
    -DARDUINO_ESP32_DEV
    -DCORE_DEBUG_LEVEL=0

; Upload settings
upload_speed = 921600
